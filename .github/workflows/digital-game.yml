name: Digital Game Check

on:
  push:
    paths:
      - '03_digital-game/**'
      - '.github/workflows/digital-game.yml'
  pull_request:
    paths:
      - '03_digital-game/**'
      - '.github/workflows/digital-game.yml'

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03_digital-game
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate data
        run: npm run validate

      - name: Build app
        run: npm run build
